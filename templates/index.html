<!DOCTYPE html>
                                                           
<html lang="ru">
<head>         
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Messenger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">                                                                                                                                                                                                                                                                 
</head>     
<body>
    <div class="sidebar">
        <div class="logo">MY MESS</div>
        <div class="chat-list" id="chat-list">
            <div class="chat-item active" onclick="selectChat('general', 'Общий чат')">
                <span class="chat-name">Общий чат</span>
                <span class="chat-preview">Добро пожаловать!</span>
            </div>
            <div class="chat-item" onclick="selectChat('m5stack', 'M5Stack Forest')">
                <span class="chat-name">M5Stack Forest</span>
                <span class="chat-preview">Данные с датчика</span>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="header"><span id="current-chat-name">Общий чат</span></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="username" placeholder="Твой ник" value="User1">
            <input type="text" id="message-text" placeholder="Сообщение...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

<script>
    const SERVER_URL = ''; // Пусто, потому что работаем на том же домене
    
    let currentChatId = 'general';
    let currentChatName = 'Общий чат';

    function selectChat(chatId, name) {
        currentChatId = chatId;
        currentChatName = name;
        document.getElementById('current-chat-name').innerText = name;
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        event.target.closest('.chat-item').classList.add('active');
        loadMessages();
    }

    async function loadMessages() {
        try {
            const res = await fetch(`${SERVER_URL}/api/messages?chat_id=${currentChatId}`);
            const data = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            data.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg ' + (msg.username === document.getElementById('username').value ? 'mine' : 'other');
                div.innerText = `[${msg.username}] ${msg.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.error(e);
        }
    }

    async function sendMessage() {
        const user = document.getElementById('username').value;
        const text = document.getElementById('message-text').value;
        if (!text) return;
        try {
            await fetch(`${SERVER_URL}/api/send_message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, text: text, chat_id: currentChatId})
            });
            loadMessages();
            document.getElementById('message-text').value = '';
        } catch (e) {
            alert('Ошибка отправки');
        }
    }

    loadMessages();
</script>
</body>
</html>
