<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- КРИТИЧЕСКИ ВАЖНО: эта строка заставляет сайт думать, что он на мобильном -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    
    <!-- Шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle, rgba(63, 94, 251, 1) 0%, rgba(159, 39, 219, 1) 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'IBM Plex Sans', sans-serif;
            color: white;
            overflow-x: hidden; /* Убирает горизонтальный скролл */
        }

        /* Стиль кнопки */
        .custom-btn {
            width: auto;
            height: 48px;
            background: #384fff;
            color: #1a1a2e;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            padding: 0 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 4px 14px rgba(56, 79, 255, 0.4);
        }

        .custom-btn:hover {
            transform: translateY(-3px);
            background: #e94560;
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .custom-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <!-- ГЛАВНЫЙ КОНТЕЙНЕР -->
    <!-- max-w-4xl = макс ширина 512px (идеально для чата). 
         h-screen = на телефоне занимает почти весь экран. 
         hidden md:flex = на телефоне это просто блок, на ПК становится строкой -->
    <div class="w-full max-w-4xl h-screen flex flex-col md:flex-row bg-white/10 backdrop-blur-md rounded-2xl shadow-2xl overflow-hidden border border-white/20">
        
        <!-- ЛЕВАЯ ЧАСТЬ (Сайдбар) -->
        <!-- hidden md:block = СКРЫТ на мобильных, ВИДЕН на ПК (начиная с 768px) -->
        <div class="w-full md:w-64 bg-gray-900/90 text-gray-300 p-4 flex flex-col gap-2 hidden md:block">
            <h2 class="text-xl font-bold text-indigo-400 border-b pb-2">MY MESS</h2>
            
            <div class="flex items-center gap-2 p-2 bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-700">
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span>Общий чат</span>
            </div>
            <div class="flex items-center gap-2 p-2 bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-700">
                <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                <span>M5Stack Forest</span>
            </div>
            <div class="flex items-center gap-2 p-2 bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-700">
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <span>Данные с датчика</span>
            </div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ (Чат) -->
        <!-- flex-1 = занимает все свободное место -->
        <div class="flex-1 flex flex-col bg-white/5 backdrop-blur-sm border-l border-white/10 overflow-hidden">
            
            <!-- Заголовок чата -->
            <div class="p-4 border-b border-white/10 flex items-center justify-between bg-gray-900/20">
                <h3 class="text-lg font-bold text-white">Общий чат</h3>
                <span class="text-xs text-gray-400">Онлайн: 12</span>
            </div>

            <!-- Область сообщений (скроллится только она) -->
            <div id="messages-area" class="flex-1 p-4 overflow-y-auto space-y-3 pb-20">
                <!-- Пример сообщения от бота -->
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs text-white font-bold">AI</div>
                    <div class="bg-gray-200 text-gray-800 text-sm rounded-xl p-3 max-w-xs">
                        Привет! Теперь на телефоне сайдбара нет, а чат занимает весь экран.
                    </div>
                </div>
                <!-- Пример сообщения от пользователя -->
                <div class="flex gap-3 justify-end">
                    <div class="bg-white text-gray-800 text-sm rounded-xl p-3 max-w-xs">
                        Ура! Выглядит как настоящее приложение!
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-400"></div>
                </div>
            </div>

            <!-- Панель ввода (всегда внизу) -->
            <div class="p-4 bg-gray-900/50 border-t border-white/10 absolute bottom-0 left-0 w-full">
                <div class="flex gap-3 items-center bg-white/10 backdrop-blur-sm p-2 rounded-xl border border-white/20">
                    <!-- Поле имени (readonly + autocomplete off) -->
                    <input type="text" id="username" value="User1" class="w-20 bg-white/20 border border-white/20 text-white rounded-lg px-3 py-2 text-xs uppercase tracking-wider readonly" readonly autocomplete="off">
                    
                    <!-- Поле сообщения -->
                    <input type="text" id="message" placeholder="Введите сообщение..." class="flex-1 bg-transparent text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-400 transition" autocomplete="off">
                    
                    <!-- Кнопка -->
                    <button onclick="sendMessage()" class="custom-btn">
                        ➤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
    function sendMessage() {
        const messageInput = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const messagesArea = document.getElementById('messages-area');
        
        const text = messageInput.value.trim();
        if (!text) return;

        // Создаем новое сообщение
        const msgDiv = document.createElement('div');
        msgDiv.className = 'flex gap-3 justify-end';
        
        // ИСПРАВЛЕНИЕ: используем innerText вместо вставки через шаблонную строку
        msgDiv.innerHTML = `
            <div class="bg-white text-gray-800 text-sm rounded-xl p-3 max-w-xs">
                \${text}
            </div>
            <div class="w-8 h-8 rounded-full bg-gray-400"></div>
        `;
        
        messagesArea.appendChild(msgDiv);
        messageInput.value = '';
        
        // Прокрутка вниз к новому сообщению
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // Автопрокрутка при загрузке
    const messagesArea = document.getElementById('messages-area');
    if(messagesArea) {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

                <div class="bg-white text-gray-800 text-sm rounded-xl p-3 max-w-xs">
                    \${text}
                </div>
    </script>
</body>
</html>
