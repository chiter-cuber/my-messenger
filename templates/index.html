<!DOCTYPE html>
<html lang="ru">
<head>
<style>
    html, body {
        height: 100%;
        margin: 0;
        /* Гарантируем, что высота не будет "прыгать" при появлении клавиатуры */
        overscroll-behavior: none; 
    }

    /* Хак для iOS/Android: используем безопасную зону, чтобы контент не наезжал на кнопки браузера */
    @supports (padding-top: env(safe-area-inset-top)) {
        body {
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
        }
    }
    
    /* Если у тебя есть контейнер для всего приложения (например, #app), 
       принудительно растягиваем его на всю высоту */
    #app, .main-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
</style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    <script> src="https://cdn.tailwindcss.com"
       
   </script>
</head>
<body class="bg-gray-900 text-white overflow-hidden flex flex-col h-screen">

    <!-- Центральная область (сцены) -->
    <div class="flex-1 overflow-y-auto p-4 relative">
        
        <!-- СЦЕНА: ЧАТЫ -->
        <div id="scene-chats" class="h-full flex flex-col scene-active">
            <h2 class="text-xl font-bold mb-4">Чаты</h2>
            
            <div id="messages-area" class="space-y-3 mb-20">
                <!-- Пример сообщения -->
                <div class="flex gap-3 message-row" data-channel="general">
                    <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs text-white font-bold">AI</div>
                    <div class="bg-gray-700 text-gray-200 text-sm rounded-xl p-3 max-w-xs">Привет! Попробуй кнопки внизу.</div>
                </div>
            </div>

            <!-- Панель ввода -->
            <div class="absolute bottom-12 left-4 right-4 z-10 bg-gray-800 p-2 rounded-xl border border-gray-600">
                <div class="flex gap-2">
                    <input type="text" id="message" placeholder="Сообщение..." class="flex-1 bg-transparent text-white outline-none">
                    <button onclick="sendMessage()" class="bg-indigo-600 px-4 py-2 rounded text-white hover:bg-indigo-500">➤</button>
                </div>
            </div>
        </div>

        <!-- СЦЕНА: ПРОФИЛЬ -->
        <div id="scene-profile" class="h-full flex flex-col hidden p-4">
            <button onclick="switchScene('chats')" class="text-indigo-400 mb-4">&lt; Назад</button>
            <div class="flex flex-col items-center gap-4 flex-1">
                <div class="w-20 h-20 rounded-full bg-purple-600 flex items-center justify-center text-3xl font-bold text-white">U1</div>
                <h2 class="text-2xl font-bold">User1</h2>
                <p class="text-gray-400 text-center">Разработчик мини-устройств</p>
                <div class="grid grid-cols-3 w-full mt-6 text-center">
                    <div><div class="font-bold text-white">24</div><div class="text-xs text-gray-400">Чатов</div></div>
                    <div><div class="font-bold text-white">12</div><div class="text-xs text-gray-400">Звонков</div></div>
                    <div><div class="font-bold text-white">7</div><div class="text-xs text-gray-400">Контактов</div></div>
                </div>
            </div>
        </div>

        <!-- СЦЕНА: ЗВОНКИ -->
        <div id="scene-calls" class="h-full flex flex-col hidden p-4">
            <button onclick="switchScene('chats')" class="text-indigo-400 mb-4">&lt; Назад</button>
            <h2 class="text-2xl font-bold mb-6">Звонки</h2>
            <div class="space-y-4 flex-1">
                <div class="flex items-center gap-3 p-3 bg-gray-800 rounded-xl">
                    <div class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-white font-bold">A</div>
                    <div>
                        <div class="font-bold text-white">Андрей</div>
                        <div class="text-xs text-green-400">Входящий • 15 мин назад</div>
                    </div>
                </div>
                <div class="flex items-center gap-3 p-3 bg-gray-800 rounded-xl">
                    <div class="w-10 h-10 rounded-full bg-purple-500 flex items-center justify-center text-white font-bold">M</div>
                    <div>
                        <div class="font-bold text-white">Максим</div>
                        <div class="text-xs text-red-400">Пропущенный • 2 часа назад</div>
                    </div>
                </div>
                <div class="flex items-center gap-3 p-3 bg-gray-800 rounded-xl">
                    <div class="w-10 h-10 rounded-full bg-teal-500 flex items-center justify-center text-white font-bold">K</div>
                    <div>
                        <div class="font-bold text-white">Катя</div>
                        <div class="text-xs text-green-400">Исходящий • Вчера</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav bg-gray-800/90 backdrop-blur border-t border-gray-700 px-4 py-3 flex justify-around items-center">
        <button class="nav-item active" onclick="switchScene('chats')">
            <svg class="w-6 h-6 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span class="text-[10px] text-gray-300">Чаты</span>
        </button>

        <button class="nav-item" onclick="switchScene('profile')">
            <svg class="w-6 h-6 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span class="text-[10px] text-gray-300">Профиль</span>
        </button>

        <button class="nav-item" onclick="switchScene('calls')">
            <svg class="w-6 h-6 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92l-2.39-1.19a2 2 0 00-2.17-2.17l-1.19-2.39a.5.5 0 .07-.17L12.5 8.83a.5.5 0-.07-.18l-2.23-1.11a2 2 0 00-2.17-.24l-1.21.61a.5.5 0 00 .16.94l1.22 1.22a.5.5 0 .07.18l1.13 2.27a2 2 0 002.17 2.17l2.38 1.19a.5.5 0 .07.18.16l.61 1.22a.5.5 0 00.94-.16l1.22-1.22a.5.5 0-.07-.18-1.13l-2.25-1.12a2 2 0 00-2.18-2.18l-1.19-2.38a.5.5 0-.07-.16-.18l-.62-1.22a.5.5 0 00-.94.16z"/></svg>
            <span class="text-[10px] text-gray-300">Звонки</span>
        </button>
    </div>
    <script>

        function switchScene(sceneName) {
            // Скрываем все сцены
            document.querySelectorAll('[id^="scene-"]').forEach(el => {
                el.classList.add('hidden');
            });

            // Показываем нужную
            const target = document.getElementById('scene-' + sceneName);
            if (target) {
                target.classList.remove('hidden');
            }

            // Обновляем кнопки навигации
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            
            const activeBtn = document.querySelector(`button[onclick="switchScene('${sceneName}')"]`).parentElement;
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }

        function sendMessage() {
            const messageInput = document.getElementById('message');
            const messagesArea = document.getElementById('messages-area');
            
            if (!messageInput || !messagesArea) return;

            const text = messageInput.value.trim();
            if (!text) return;

            // Создаём сообщение пользователя
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex gap-3 justify-end message-row';
            msgDiv.dataset.channel = 'general';

            const msgBubble = document.createElement('div');
            msgBubble.className = 'bg-indigo-600 text-white text-sm rounded-xl p-3 max-w-xs';
            msgBubble.textContent = text;

            const avatar = document.createElement('div');
            avatar.className = 'w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center text-xs text-white font-bold';
            avatar.textContent = 'U';

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(msgBubble);
            messagesArea.appendChild(msgDiv);

            messageInput.value = '';
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
    </script>
</body>
</html>
